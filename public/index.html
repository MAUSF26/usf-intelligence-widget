<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Marketing Channel Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grad-navy: linear-gradient(135deg, #261759 0%, #3d2580 100%);
    --grad-teal: linear-gradient(135deg, #0E635D 0%, #1a9e96 100%);
    --grad-peri: linear-gradient(135deg, #5566cc 0%, #8598E3 100%);
    --grad-cran: linear-gradient(135deg, #85298C 0%, #c04ac8 100%);
    --grad-sweep: linear-gradient(135deg, #8598E3 0%, #85298C 100%);
    --canvas: linear-gradient(135deg, #1a0d3d 0%, #261759 35%, #3a1060 65%, #4a1555 100%);
    --glass-t2-bg: rgba(255,255,255,0.08);
    --glass-t2-border: rgba(255,255,255,0.15);
    --text-heading: rgba(255,255,255,0.97);
    --text-body: rgba(255,255,255,0.82);
    --text-meta: rgba(255,255,255,0.55);
    --text-sub: rgba(255,255,255,0.65);
    --periwinkle: #8598E3;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Roboto', sans-serif;
    background: var(--canvas);
    color: var(--text-body);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 850px; height: 850px;
    top: -320px; right: -260px;
    background: radial-gradient(circle, rgba(133,152,227,0.18) 0%, transparent 68%);
  }
  body::after {
    width: 750px; height: 750px;
    bottom: -280px; left: -230px;
    background: radial-gradient(circle, rgba(133,41,140,0.15) 0%, transparent 68%);
  }
  .blob-teal {
    position: fixed;
    width: 550px; height: 550px;
    top: 45%; left: -15%;
    background: radial-gradient(circle, rgba(14,99,93,0.12) 0%, transparent 68%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 20px 44px;
  }

  /* ── Hero bar: title left, date pill right ── */
  .hero-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease-out both;
    gap: 16px;
  }
  .hero-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-heading);
    line-height: 1.3;
  }
  .hero-date-pill {
    display: inline-flex;
    align-items: center;
    padding: 7px 18px;
    border-radius: 22px;
    background: var(--glass-t2-bg);
    border: 1px solid var(--glass-t2-border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.88);
    white-space: nowrap;
    flex-shrink: 0;
    position: relative;
  }
  .hero-date-pill::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.20), transparent);
    border-radius: 22px 22px 0 0;
  }

  /* ── Summary ── */
  .summary-panel {
    position: relative;
    margin-bottom: 20px;
    padding: 16px 20px;
    background: var(--glass-t2-bg);
    border: 1px solid var(--glass-t2-border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    animation: fadeUp 0.5s ease-out 0.05s both;
  }
  .summary-panel::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    border-radius: 14px 14px 0 0;
  }
  .summary-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-meta);
    margin-bottom: 8px;
  }
  .summary-text {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text-body);
  }

  /* ── Channel nav ── */
  .channel-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease-out 0.1s both;
  }
  .ch-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 15px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.78);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.22s ease;
    user-select: none;
    white-space: nowrap;
  }
  .ch-pill:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.28);
    color: #fff;
  }
  .ch-pill.active {
    border-color: transparent;
    color: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .ch-pill .pill-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
  .ch-pill .pill-icon svg { width: 14px; height: 14px; fill: currentColor; }

  .ch-pill[data-ch="seo"].active     { background: var(--grad-teal); }
  .ch-pill[data-ch="paid"].active    { background: var(--grad-peri); }
  .ch-pill[data-ch="content"].active { background: var(--grad-cran); }
  .ch-pill[data-ch="email"].active   { background: var(--grad-navy); }
  .ch-pill[data-ch="reg"].active     { background: linear-gradient(135deg, #571759 0%, #85298C 100%); }
  .ch-pill[data-ch="fert"].active    { background: linear-gradient(135deg, #0E635D 0%, #8DCA8B 100%); }
  .ch-pill[data-ch="ai"].active      { background: var(--grad-sweep); }

  /* ── Content card ── */
  .content-card {
    position: relative;
    background: var(--glass-t2-bg);
    border: 1px solid var(--glass-t2-border);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 24px;
    min-height: 160px;
  }
  .content-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
    border-radius: 16px 16px 0 0;
  }

  .card-ch-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .card-ch-icon {
    width: 40px; height: 40px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .card-ch-icon::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.30), transparent);
    border-radius: 11px 11px 0 0;
  }
  .card-ch-icon svg { width: 20px; height: 20px; fill: #fff; }
  .card-ch-name { font-size: 18px; font-weight: 700; color: var(--text-heading); }

  .sect-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-meta);
    margin-bottom: 8px;
    margin-top: 20px;
  }
  .sect-label:first-of-type { margin-top: 0; }

  .insight-text {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-body);
  }

  .rec-list { display: flex; flex-direction: column; gap: 6px; }
  .rec-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 9px 12px;
    border-radius: 9px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.09);
    font-size: 13px;
    line-height: 1.55;
    color: rgba(255,255,255,0.92);
  }
  .rec-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .article-list { display: flex; flex-direction: column; gap: 6px; }
  .article-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border-radius: 9px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    font-size: 13px;
    color: var(--periwinkle);
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.5;
  }
  .article-link:hover {
    background: rgba(133,152,227,0.12);
    border-color: rgba(133,152,227,0.25);
  }
  .article-link .arrow {
    font-size: 12px;
    color: var(--text-meta);
    margin-left: auto;
    flex-shrink: 0;
  }
  .link-icon { display: flex; align-items: center; flex-shrink: 0; }
  .link-icon svg { width: 14px; height: 14px; fill: var(--periwinkle); opacity: 0.7; }

  .stack-pills { display: flex; flex-wrap: wrap; gap: 7px; }
  .stack-pill {
    padding: 5px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 11.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.88);
  }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-sub);
    font-size: 13px;
  }

  .loading-container { text-align: center; padding: 80px 20px; }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.10);
    border-top-color: var(--periwinkle);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  .loading-text { font-size: 13px; color: var(--text-meta); }

  .error-container { text-align: center; padding: 48px 20px; }
  .error-icon { font-size: 28px; margin-bottom: 10px; }
  .error-msg { font-size: 13px; color: var(--text-sub); margin-bottom: 14px; line-height: 1.55; }
  .retry-btn {
    padding: 8px 24px; border-radius: 10px;
    background: var(--grad-peri); border: none;
    color: #fff; font-family: 'Roboto', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  .retry-btn:hover { opacity: 0.85; }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: var(--text-meta);
    letter-spacing: 0.04em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card-body { animation: cardIn 0.3s ease-out both; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .app { padding: 20px 14px 36px; }
    .hero-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
    .hero-title { font-size: 17px; }
    .hero-date-pill { font-size: 12px; padding: 6px 14px; }
    .ch-pill { padding: 6px 11px; font-size: 11px; gap: 5px; }
    .ch-pill .pill-icon { width: 14px; height: 14px; }
    .ch-pill .pill-icon svg { width: 12px; height: 12px; }
    .content-card { padding: 18px 16px; }
    .card-ch-name { font-size: 16px; }
    .card-ch-icon { width: 34px; height: 34px; }
    .card-ch-icon svg { width: 17px; height: 17px; }
  }
</style>
</head>
<body>
<div class="blob-teal"></div>

<div class="app" id="app">
  <div class="loading-container">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading today's briefing…</div>
  </div>
</div>

<script>
(function() {

  const ICONS = {
    'SEO & GEO': '<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>',
    'Paid Social': '<svg viewBox="0 0 24 24"><path d="M18 11v2h4v-2h-4zm-2 6.61c.96.71 2.21 1.65 3.2 2.39.4-.53.8-1.07 1.2-1.6-.99-.74-2.24-1.68-3.2-2.4-.4.54-.8 1.08-1.2 1.61zM20.4 5.6c-.4-.53-.8-1.07-1.2-1.6-.99.74-2.24 1.68-3.2 2.4.4.53.8 1.07 1.2 1.6.96-.72 2.21-1.65 3.2-2.4zM4 9c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h1l5 3V6L5 9H4zm11.5 3c0-1.33-.58-2.53-1.5-3.35v6.69c.92-.81 1.5-2.01 1.5-3.34z"/></svg>',
    'Content & Creative': '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
    'Email & CRM': '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>',
    'Regulatory & Compliance': '<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>',
    'Fertility Sector': '<svg viewBox="0 0 24 24"><path d="M17.56 14.24c.28-.69.44-1.45.44-2.24 0-3.31-2.69-6-6-6s-6 2.69-6 6c0 .79.16 1.55.44 2.24C4.39 15.61 3 17.74 3 20v2h18v-2c0-2.26-1.39-4.39-3.44-5.76zM12 8c2.21 0 4 1.79 4 4s-1.79 4-4 4-4-1.79-4-4 1.79-4 4-4zm0 10c-3.37 0-7 1.56-7 3v1h14v-1c0-1.44-3.63-3-7-3z"/></svg>',
    'AI Tools & Platforms': '<svg viewBox="0 0 24 24"><path d="M21 10.12h-6.78l2.74-2.82c-2.73-2.7-7.15-2.8-9.88-.1-2.73 2.71-2.73 7.08 0 9.79s7.15 2.71 9.88 0C18.32 15.65 19 14.08 19 12.1h2c0 1.98-.88 4.55-2.64 6.29-3.51 3.48-9.21 3.48-12.72 0-3.5-3.47-3.53-9.11-.02-12.58s9.14-3.49 12.65 0L21 3v7.12zM12.5 8v4.25l3.5 2.08-.72 1.21L11 13V8h1.5z"/></svg>',
    'article': '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>'
  };

  const CHANNELS = [
    { key: 'SEO & GEO',              slug: 'seo',     grad: 'var(--grad-teal)',  dot: '#1a9e96' },
    { key: 'Paid Social',             slug: 'paid',    grad: 'var(--grad-peri)',  dot: '#8598E3' },
    { key: 'Content & Creative',      slug: 'content', grad: 'var(--grad-cran)',  dot: '#c04ac8' },
    { key: 'Email & CRM',             slug: 'email',   grad: 'var(--grad-navy)',  dot: '#3d2580' },
    { key: 'Regulatory & Compliance', slug: 'reg',     grad: 'linear-gradient(135deg, #571759 0%, #85298C 100%)', dot: '#85298C' },
    { key: 'Fertility Sector',        slug: 'fert',    grad: 'linear-gradient(135deg, #0E635D 0%, #8DCA8B 100%)', dot: '#8DCA8B' },
    { key: 'AI Tools & Platforms',    slug: 'ai',      grad: 'var(--grad-sweep)', dot: '#FFBB06' }
  ];

  let dataByChannel = {};
  let activeChannel = null;

  function norm(record) {
    if (record && record.fields && typeof record.fields === 'object') return record.fields;
    return record;
  }

  function formatDate(dateStr) {
    const d = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function formatDateShort(dateStr) {
    const d = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  async function fetchData() {
    const resp = await fetch('/api/get-intelligence');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    return Array.isArray(json) ? json : (json.records || json.data || []);
  }

  function buildSummary(records) {
    const highlights = [];
    const seen = new Set();
    records.forEach(r => {
      const f = norm(r);
      if (f.Channel && !seen.has(f.Channel) && f.Insight) {
        seen.add(f.Channel);
        const first = f.Insight.split(/\.\s/)[0];
        highlights.push(first.endsWith('.') ? first : first + '.');
      }
    });
    if (highlights.length === 0) return 'No briefing data available for today. Check back after the 6 AM refresh.';
    return highlights.slice(0, 3).join(' ');
  }

  function renderApp(records) {
    const app = document.getElementById('app');
    const allFields = records.map(norm);
    const dateStr = allFields.length > 0 ? allFields[0].Date : null;

    dataByChannel = {};
    CHANNELS.forEach(c => { dataByChannel[c.key] = null; });
    allFields.forEach(f => {
      if (f.Channel && f.Channel in dataByChannel && dataByChannel[f.Channel] === null) {
        dataByChannel[f.Channel] = f;
      }
    });

    activeChannel = (CHANNELS.find(c => dataByChannel[c.key]) || CHANNELS[0]).key;
    const summaryText = buildSummary(records);

    let html = '';

    /* Hero bar */
    html += `
    <div class="hero-bar">
      <div class="hero-title">Daily Marketing Channel Briefing</div>
      <div class="hero-date-pill">${formatDateShort(dateStr)}</div>
    </div>`;

    /* Summary */
    html += `
    <div class="summary-panel">
      <div class="summary-label">Today's Overview</div>
      <div class="summary-text">${summaryText}</div>
    </div>`;

    /* Channel pills */
    html += '<div class="channel-nav" id="channelNav">';
    CHANNELS.forEach(c => {
      const isActive = c.key === activeChannel;
      html += `<div class="ch-pill${isActive ? ' active' : ''}" data-ch="${c.slug}" data-key="${c.key}">
        <span class="pill-icon">${ICONS[c.key]}</span>
        <span>${c.key}</span>
      </div>`;
    });
    html += '</div>';

    html += '<div id="contentCard"></div>';
    html += '<div class="footer">Auto-refreshed daily at 6:00 AM ET · USF AI Marketing Hub</div>';

    app.innerHTML = html;

    document.querySelectorAll('.ch-pill').forEach(pill => {
      pill.addEventListener('click', function() {
        const key = this.dataset.key;
        if (key === activeChannel) return;
        activeChannel = key;
        document.querySelectorAll('.ch-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        renderCard();
      });
    });

    renderCard();
  }

  function renderCard() {
    const container = document.getElementById('contentCard');
    const ch = CHANNELS.find(c => c.key === activeChannel);
    if (!ch) return;

    const data = dataByChannel[ch.key];
    const icon = ICONS[ch.key];
    const artIcon = ICONS['article'];

    if (!data) {
      container.innerHTML = `
      <div class="content-card">
        <div class="card-body">
          <div class="card-ch-header">
            <div class="card-ch-icon" style="background:${ch.grad}">${icon}</div>
            <div class="card-ch-name">${ch.key}</div>
          </div>
          <div class="empty-state">No update for this channel today. Check back after the next 6 AM refresh.</div>
        </div>
      </div>`;
      return;
    }

    const insight = data.Insight || '';
    const todo1   = data.ToDo1 || '';
    const todo2   = data.ToDo2 || '';
    const art1    = data['Article Title'] || '';
    const url1    = data['Article URL'] || '';
    const art2    = data['Article Title 2'] || '';
    const url2    = data['Article URL 2'] || '';
    const stack   = data.Stack || '';

    let inner = `
    <div class="card-ch-header">
      <div class="card-ch-icon" style="background:${ch.grad}">${icon}</div>
      <div class="card-ch-name">${ch.key}</div>
    </div>`;

    if (insight) {
      inner += `<div class="sect-label">Insight</div><div class="insight-text">${insight}</div>`;
    }

    if (todo1 || todo2) {
      inner += `<div class="sect-label">Recommendations</div><div class="rec-list">`;
      if (todo1) inner += `<div class="rec-item"><span class="rec-dot" style="background:${ch.dot}"></span><span>${todo1}</span></div>`;
      if (todo2) inner += `<div class="rec-item"><span class="rec-dot" style="background:${ch.dot}"></span><span>${todo2}</span></div>`;
      inner += '</div>';
    }

    if ((art1 && url1) || (art2 && url2)) {
      inner += `<div class="sect-label">Reading</div><div class="article-list">`;
      if (art1 && url1) inner += `<a class="article-link" href="${url1}" target="_blank" rel="noopener"><span class="link-icon">${artIcon}</span><span>${art1}</span><span class="arrow">↗</span></a>`;
      if (art2 && url2) inner += `<a class="article-link" href="${url2}" target="_blank" rel="noopener"><span class="link-icon">${artIcon}</span><span>${art2}</span><span class="arrow">↗</span></a>`;
      inner += '</div>';
    }

    if (stack) {
      inner += `<div class="sect-label">Current Stack</div><div class="stack-pills">`;
      stack.split(',').forEach(s => {
        const t = s.trim();
        if (t) inner += `<span class="stack-pill">${t}</span>`;
      });
      inner += '</div>';
    }

    container.innerHTML = `<div class="content-card"><div class="card-body">${inner}</div></div>`;
  }

  function renderError(msg) {
    document.getElementById('app').innerHTML = `
      <div class="hero-bar">
        <div class="hero-title">Daily Marketing Channel Briefing</div>
        <div class="hero-date-pill">${formatDateShort()}</div>
      </div>
      <div class="error-container">
        <div class="error-icon">⚠</div>
        <div class="error-msg">${msg}</div>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
      </div>`;
  }

  fetchData()
    .then(records => renderApp(records))
    .catch(err => {
      console.error('Fetch failed:', err);
      renderError('Could not load today\'s briefing. Confirm the n8n automation has run and the API endpoint is reachable.');
    });

})();
</script>
</body>
</html>
