<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USF AI Intelligence Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Tokens ── */
  :root {
    --grad-navy: linear-gradient(135deg, #261759 0%, #3d2580 100%);
    --grad-teal: linear-gradient(135deg, #0E635D 0%, #1a9e96 100%);
    --grad-peri: linear-gradient(135deg, #5566cc 0%, #8598E3 100%);
    --grad-cran: linear-gradient(135deg, #85298C 0%, #c04ac8 100%);
    --grad-sweep: linear-gradient(135deg, #8598E3 0%, #85298C 100%);
    --canvas: linear-gradient(135deg, #1a0d3d 0%, #261759 35%, #3a1060 65%, #4a1555 100%);
    --glass-t1-bg: rgba(255,255,255,0.05);
    --glass-t1-border: rgba(255,255,255,0.10);
    --glass-t2-bg: rgba(255,255,255,0.08);
    --glass-t2-border: rgba(255,255,255,0.15);
    --glass-t3-bg: rgba(255,255,255,0.12);
    --glass-t3-border: rgba(255,255,255,0.22);
    --text-heading: rgba(255,255,255,0.97);
    --text-body: rgba(255,255,255,0.82);
    --text-meta: rgba(255,255,255,0.55);
    --text-sub: rgba(255,255,255,0.65);
    --navy: #261759;
    --emerald: #0E635D;
    --cranberry: #571759;
    --gold: #FFBB06;
    --periwinkle: #8598E3;
    --mint: #8DCA8B;
    --bright-cran: #85298C;
    --slate: #AEC6D1;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Roboto', sans-serif;
    background: var(--canvas);
    color: var(--text-body);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Radial blobs ── */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 900px; height: 900px;
    top: -320px; right: -280px;
    background: radial-gradient(circle, rgba(133,152,227,0.18) 0%, transparent 68%);
  }
  body::after {
    width: 800px; height: 800px;
    bottom: -300px; left: -250px;
    background: radial-gradient(circle, rgba(133,41,140,0.15) 0%, transparent 68%);
  }

  .blob-teal {
    position: fixed;
    width: 600px; height: 600px;
    top: 50%; left: 50%;
    transform: translate(-80%, -30%);
    background: radial-gradient(circle, rgba(14,99,93,0.12) 0%, transparent 68%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout wrapper ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px 48px;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease-out both;
  }

  .hero-eyebrow {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-meta);
    margin-bottom: 10px;
  }

  .hero-date {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    background: var(--grad-sweep);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .hero-overview {
    position: relative;
    max-width: 720px;
    margin: 16px auto 0;
    padding: 18px 24px;
    background: var(--glass-t2-bg);
    border: 1px solid var(--glass-t2-border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-body);
  }
  .hero-overview::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    border-radius: 14px 14px 0 0;
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .hero-stat {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.88);
  }
  .hero-stat .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  /* ── Channel grid ── */
  .channel-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }

  /* ── Channel card ── */
  .channel-card {
    position: relative;
    background: var(--glass-t2-bg);
    border: 1px solid var(--glass-t2-border);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 22px 22px 20px;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    animation: fadeUp 0.5s ease-out both;
    overflow: hidden;
  }
  .channel-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
    border-radius: 16px 16px 0 0;
  }
  .channel-card:hover {
    transform: translateY(-2px);
  }

  .channel-card.expanded .card-expand {
    max-height: 800px;
    opacity: 1;
    margin-top: 16px;
  }
  .channel-card.expanded .toggle-icon {
    transform: rotate(180deg);
  }

  /* Card header */
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    cursor: pointer;
    user-select: none;
  }
  .card-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    position: relative;
  }
  .card-icon::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.30), transparent);
    border-radius: 10px 10px 0 0;
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-heading);
    flex: 1;
  }
  .toggle-icon {
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-meta);
    transition: transform 0.25s ease;
    font-size: 13px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    flex-shrink: 0;
  }

  /* Insight */
  .card-insight {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-body);
  }

  /* Expandable section */
  .card-expand {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.35s ease, margin-top 0.3s ease;
    margin-top: 0;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-meta);
    margin-bottom: 8px;
  }
  .section-label:not(:first-child) {
    margin-top: 16px;
  }

  /* Recommendations */
  .rec-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .rec-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 8px 11px;
    border-radius: 9px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.09);
    font-size: 12.5px;
    line-height: 1.5;
    color: rgba(255,255,255,0.90);
  }
  .rec-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  /* Articles */
  .article-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .article-link {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 12px;
    border-radius: 9px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    font-size: 12.5px;
    color: var(--periwinkle);
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.45;
  }
  .article-link:hover {
    background: rgba(133,152,227,0.12);
    border-color: rgba(133,152,227,0.25);
  }
  .article-link .arrow {
    font-size: 11px;
    color: var(--text-meta);
    margin-left: auto;
    flex-shrink: 0;
  }
  .link-icon {
    font-size: 13px;
    flex-shrink: 0;
    opacity: 0.7;
  }

  /* Stack */
  .stack-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .stack-pill {
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
  }

  /* ── Loading state ── */
  .loading-container {
    text-align: center;
    padding: 80px 20px;
  }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.10);
    border-top-color: var(--periwinkle);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  .loading-text {
    font-size: 13px;
    color: var(--text-meta);
  }

  /* ── Error state ── */
  .error-container {
    text-align: center;
    padding: 60px 20px;
  }
  .error-icon { font-size: 32px; margin-bottom: 12px; }
  .error-msg {
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 16px;
  }
  .retry-btn {
    padding: 8px 24px;
    border-radius: 10px;
    background: var(--grad-peri);
    border: none;
    color: #fff;
    font-family: 'Roboto', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .retry-btn:hover { opacity: 0.85; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: var(--text-meta);
    letter-spacing: 0.04em;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .channel-grid { grid-template-columns: 1fr; }
    .hero-date { font-size: 26px; }
    .app { padding: 24px 16px 40px; }
  }
  @media (max-width: 500px) {
    .hero-date { font-size: 22px; }
    .channel-card { padding: 18px 16px 16px; }
    .card-icon { width: 32px; height: 32px; font-size: 15px; }
    .card-title { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="blob-teal"></div>

<div class="app" id="app">
  <div class="loading-container" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading today's intelligence…</div>
  </div>
</div>

<script>
(function() {
  // ── Channel config ──
  const CHANNELS = {
    'SEO & GEO':               { icon: '🔍', gradient: 'var(--grad-teal)',  dot: '#1a9e96' },
    'Paid Social':              { icon: '📣', gradient: 'var(--grad-peri)',  dot: '#8598E3' },
    'Content & Creative':       { icon: '✦',  gradient: 'var(--grad-cran)',  dot: '#c04ac8' },
    'Email & CRM':              { icon: '✉',  gradient: 'var(--grad-navy)',  dot: '#3d2580' },
    'Regulatory & Compliance':  { icon: '🛡', gradient: 'linear-gradient(135deg, #571759 0%, #85298C 100%)', dot: '#85298C' },
    'Fertility Sector':         { icon: '🧬', gradient: 'linear-gradient(135deg, #0E635D 0%, #8DCA8B 100%)', dot: '#8DCA8B' },
    'AI Tools & Platforms':     { icon: '⚡', gradient: 'var(--grad-sweep)', dot: '#FFBB06' }
  };

  const CHANNEL_ORDER = [
    'SEO & GEO', 'Paid Social', 'Content & Creative', 'Email & CRM',
    'Regulatory & Compliance', 'Fertility Sector', 'AI Tools & Platforms'
  ];

  // ── Date formatting ──
  function formatDate(dateStr) {
    const d = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
    return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // ── Fetch data ──
  async function fetchData() {
    const resp = await fetch('/api/get-intelligence');
    if (!resp.ok) throw new Error('Network response ' + resp.status);
    const json = await resp.json();
    // Normalize: accept { records: [...] } or raw array
    return Array.isArray(json) ? json : (json.records || json.data || []);
  }

  // ── Build overview from today's records ──
  function buildOverview(records) {
    const count = records.length;
    if (count === 0) return 'No briefing data available for today. Check back after the 6 AM refresh.';
    const channels = [...new Set(records.map(r => r.Channel || r.fields?.Channel))].filter(Boolean);
    return `${count} intelligence update${count > 1 ? 's' : ''} across ${channels.length} channel${channels.length > 1 ? 's' : ''} — tap any card to expand recommendations and reading.`;
  }

  // ── Render ──
  function render(records) {
    const app = document.getElementById('app');
    const dateStr = records.length > 0 ? (records[0].Date || records[0].fields?.Date) : null;

    // Group by channel
    const grouped = {};
    CHANNEL_ORDER.forEach(ch => grouped[ch] = []);
    records.forEach(r => {
      const f = r.fields || r;
      const ch = f.Channel;
      if (ch && grouped[ch]) grouped[ch].push(f);
    });

    // Count channels with data
    const activeChannels = CHANNEL_ORDER.filter(ch => grouped[ch].length > 0);

    let html = '';

    // ── Hero ──
    html += `
    <div class="hero">
      <div class="hero-eyebrow">USF AI Intelligence Briefing</div>
      <div class="hero-date">${formatDate(dateStr)}</div>
      <div class="hero-overview">
        ${buildOverview(records)}
        <div class="hero-stats">
          ${activeChannels.map(ch => {
            const cfg = CHANNELS[ch] || {};
            return `<span class="hero-stat"><span class="dot" style="background:${cfg.dot || '#8598E3'}"></span>${ch}</span>`;
          }).join('')}
        </div>
      </div>
    </div>`;

    // ── Grid ──
    html += '<div class="channel-grid">';

    CHANNEL_ORDER.forEach((ch, idx) => {
      const cfg = CHANNELS[ch] || { icon: '📌', gradient: 'var(--grad-navy)', dot: '#3d2580' };
      const items = grouped[ch];
      const first = items[0] || {};

      const insight = first.Insight || 'No update today.';
      const todo1 = first.ToDo1;
      const todo2 = first.ToDo2;
      const art1 = first['Article Title'];
      const url1 = first['Article URL'];
      const art2 = first['Article Title 2'];
      const url2 = first['Article URL 2'];
      const stack = first.Stack;

      const hasExpand = todo1 || todo2 || art1 || art2 || stack;
      const delay = 0.08 + idx * 0.06;

      html += `
      <div class="channel-card${!hasExpand ? '' : ''}" style="animation-delay:${delay}s" data-channel="${ch}">
        <div class="card-header" ${hasExpand ? 'onclick="toggleCard(this)"' : ''}>
          <div class="card-icon" style="background:${cfg.gradient}">${cfg.icon}</div>
          <div class="card-title">${ch}</div>
          ${hasExpand ? '<div class="toggle-icon">▾</div>' : ''}
        </div>
        <div class="card-insight">${insight}</div>
        ${hasExpand ? `<div class="card-expand">` +
          // Recommendations
          (todo1 || todo2 ? `
            <div class="section-label">Recommendations</div>
            <div class="rec-list">
              ${todo1 ? `<div class="rec-item"><span class="rec-dot" style="background:${cfg.dot}"></span><span>${todo1}</span></div>` : ''}
              ${todo2 ? `<div class="rec-item"><span class="rec-dot" style="background:${cfg.dot}"></span><span>${todo2}</span></div>` : ''}
            </div>` : '') +
          // Articles
          (art1 || art2 ? `
            <div class="section-label">Reading</div>
            <div class="article-list">
              ${art1 && url1 ? `<a class="article-link" href="${url1}" target="_blank" rel="noopener"><span class="link-icon">📄</span><span>${art1}</span><span class="arrow">↗</span></a>` : ''}
              ${art2 && url2 ? `<a class="article-link" href="${url2}" target="_blank" rel="noopener"><span class="link-icon">📄</span><span>${art2}</span><span class="arrow">↗</span></a>` : ''}
            </div>` : '') +
          // Stack
          (stack ? `
            <div class="section-label">Current Stack</div>
            <div class="stack-pills">
              ${stack.split(',').map(s => `<span class="stack-pill">${s.trim()}</span>`).join('')}
            </div>` : '') +
        `</div>` : ''}
      </div>`;
    });

    html += '</div>';

    // ── Footer ──
    html += `<div class="footer">Intelligence auto-refreshed daily at 6:00 AM ET · USF AI Marketing Hub</div>`;

    app.innerHTML = html;
  }

  // ── Error state ──
  function renderError(msg) {
    document.getElementById('app').innerHTML = `
      <div class="hero">
        <div class="hero-eyebrow">USF AI Intelligence Briefing</div>
        <div class="hero-date">${formatDate()}</div>
      </div>
      <div class="error-container">
        <div class="error-icon">⚠</div>
        <div class="error-msg">${msg}</div>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
      </div>`;
  }

  // ── Toggle card ──
  window.toggleCard = function(header) {
    header.closest('.channel-card').classList.toggle('expanded');
  };

  // ── Init ──
  fetchData()
    .then(records => render(records))
    .catch(err => {
      console.error('Intelligence fetch failed:', err);
      renderError('Could not load today\'s briefing. Make sure the n8n automation has run and the API endpoint is reachable.');
    });
})();
</script>
</body>
</html>
