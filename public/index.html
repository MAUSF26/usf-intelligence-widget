<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USF Marketing Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --grad-navy: linear-gradient(135deg, #261759 0%, #3d2580 100%);
    --grad-teal: linear-gradient(135deg, #0E635D 0%, #1a9e96 100%);
    --grad-peri: linear-gradient(135deg, #5566cc 0%, #8598E3 100%);
    --grad-cran: linear-gradient(135deg, #85298C 0%, #c04ac8 100%);
    --grad-sweep: linear-gradient(135deg, #8598E3 0%, #85298C 100%);
    --grad-gold: linear-gradient(135deg, #b88a00 0%, #FFBB06 100%);
    --grad-mint: linear-gradient(135deg, #2a7a48 0%, #8DCA8B 100%);
    --canvas: linear-gradient(135deg, #1a0d3d 0%, #261759 35%, #3a1060 65%, #4a1555 100%);
    --glass-t2-bg: rgba(255,255,255,0.08);
    --glass-t2-border: rgba(255,255,255,0.15);
    --text-heading: rgba(255,255,255,0.97);
    --text-body: rgba(255,255,255,0.82);
    --text-meta: rgba(255,255,255,0.55);
    --text-sub: rgba(255,255,255,0.65);
    --periwinkle: #8598E3;
  }
  html { font-size: 16px; }
  body {
    font-family: 'Roboto', sans-serif; background: var(--canvas);
    color: var(--text-body); min-height: 100vh; position: relative;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
  }
  body::before, body::after { content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
  body::before { width: 850px; height: 850px; top: -320px; right: -260px; background: radial-gradient(circle, rgba(133,152,227,0.18) 0%, transparent 68%); }
  body::after { width: 750px; height: 750px; bottom: -280px; left: -230px; background: radial-gradient(circle, rgba(133,41,140,0.15) 0%, transparent 68%); }
  .blob-teal { position: fixed; width: 550px; height: 550px; top: 45%; left: -15%; background: radial-gradient(circle, rgba(14,99,93,0.12) 0%, transparent 68%); border-radius: 50%; pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 28px 20px 44px; }

  /* Hero bar */
  .hero-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; animation: fadeUp 0.5s ease-out both; gap: 16px; }
  .hero-left {}
  .hero-title { font-size: 20px; font-weight: 700; color: var(--text-heading); line-height: 1.3; }
  .hero-title .gradient-text {
    background: var(--grad-sweep);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero-date-area { text-align: right; flex-shrink: 0; }
  .hero-date {
    font-size: 14px; font-weight: 600; color: var(--text-heading); margin-bottom: 2px;
  }
  .hero-refresh {
    font-size: 11px; color: var(--text-meta); font-weight: 400;
  }

  /* Hero news */
  .hero-news {
    position: relative; margin-bottom: 18px; padding: 18px 22px;
    background: var(--glass-t2-bg); border: 1px solid var(--glass-t2-border);
    border-radius: 14px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    animation: fadeUp 0.5s ease-out 0.04s both;
  }
  .hero-news::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent); border-radius: 14px 14px 0 0; }
  .hero-news-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-meta); margin-bottom: 10px; }
  .hero-headline { font-size: 17px; font-weight: 700; color: var(--text-heading); line-height: 1.4; margin-bottom: 10px; }
  .hero-overview { font-size: 13.5px; line-height: 1.65; color: var(--text-body); margin-bottom: 14px; }
  .hero-overview strong { color: var(--text-heading); }
  .hero-articles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .hero-article {
    display: flex; flex-direction: column; gap: 4px; padding: 10px 13px;
    border-radius: 9px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08); text-decoration: none;
    font-size: 12.5px; color: var(--periwinkle); transition: background 0.15s, border-color 0.15s; line-height: 1.45;
  }
  .hero-article:hover { background: rgba(133,152,227,0.12); border-color: rgba(133,152,227,0.25); }
  .hero-article .ha-title { display: flex; align-items: center; gap: 8px; }
  .hero-article .ha-icon { display: flex; flex-shrink: 0; }
  .hero-article .ha-icon svg { width: 13px; height: 13px; fill: var(--periwinkle); opacity: 0.7; }
  .hero-article .arrow { font-size: 11px; color: var(--text-meta); margin-left: auto; flex-shrink: 0; }
  .hero-article .ha-meta { font-size: 11px; color: var(--text-meta); font-weight: 400; }

  /* Two-column */
  .main-layout { display: flex; gap: 16px; animation: fadeUp 0.5s ease-out 0.1s both; }

  .sidebar { display: flex; flex-direction: column; gap: 5px; width: 220px; flex-shrink: 0; position: sticky; top: 28px; align-self: flex-start; }
  .sidebar-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-meta); padding: 0 14px 6px; }
  .ch-btn {
    display: flex; align-items: center; gap: 9px; padding: 9px 14px; border-radius: 11px;
    border: 1px solid transparent; background: transparent; color: var(--text-sub);
    font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all 0.18s ease;
    user-select: none; white-space: nowrap; text-align: left; font-family: 'Roboto', sans-serif;
  }
  .ch-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.90); }
  .ch-btn.active { background: var(--glass-t2-bg); border-color: var(--glass-t2-border); color: #fff; font-weight: 700; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .ch-btn .btn-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ch-btn .btn-icon svg { width: 14px; height: 14px; fill: currentColor; }
  .ch-btn .btn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; opacity: 0.7; transition: opacity 0.15s; }
  .ch-btn.active .btn-dot { opacity: 1; }

  .content-area { flex: 1; min-width: 0; }
  .content-card {
    position: relative; background: var(--glass-t2-bg); border: 1px solid var(--glass-t2-border);
    border-radius: 16px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 22px 24px; min-height: 200px;
  }
  .content-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent); border-radius: 16px 16px 0 0; }
  .card-ch-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .card-ch-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
  .card-ch-icon::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.30), transparent); border-radius: 10px 10px 0 0; }
  .card-ch-icon svg { width: 18px; height: 18px; fill: #fff; }
  .card-ch-name { font-size: 16px; font-weight: 700; color: var(--text-heading); }

  .sect-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-meta); margin-bottom: 7px; margin-top: 18px; }
  .sect-label:first-of-type { margin-top: 0; }

  .insight-text { font-size: 13.5px; line-height: 1.65; color: var(--text-body); }
  .insight-text strong { color: var(--text-heading); font-weight: 700; }

  .rec-list { display: flex; flex-direction: column; gap: 5px; }
  .rec-item { display: flex; align-items: flex-start; gap: 9px; padding: 8px 11px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); font-size: 12.5px; line-height: 1.5; color: rgba(255,255,255,0.90); }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

  .article-list { display: flex; flex-direction: column; gap: 6px; }
  .article-link {
    display: flex; flex-direction: column; gap: 3px; padding: 9px 13px; border-radius: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none; transition: background 0.15s, border-color 0.15s; line-height: 1.45;
  }
  .article-link:hover { background: rgba(133,152,227,0.12); border-color: rgba(133,152,227,0.25); }
  .article-title-row { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--periwinkle); }
  .article-title-row .arrow { font-size: 11px; color: var(--text-meta); margin-left: auto; flex-shrink: 0; }
  .link-icon { display: flex; align-items: center; flex-shrink: 0; }
  .link-icon svg { width: 13px; height: 13px; fill: var(--periwinkle); opacity: 0.7; }
  .article-meta { font-size: 11px; color: var(--text-meta); font-weight: 400; padding-left: 22px; }

  .stack-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .stack-pill { padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.18); font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.88); }

  .empty-state { text-align: center; padding: 28px 16px; color: var(--text-sub); font-size: 13px; }
  .loading-container { text-align: center; padding: 80px 20px; }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.10); border-top-color: var(--periwinkle); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  .loading-text { font-size: 13px; color: var(--text-meta); }
  .error-container { text-align: center; padding: 48px 20px; }
  .error-icon { font-size: 28px; margin-bottom: 10px; }
  .error-msg { font-size: 13px; color: var(--text-sub); margin-bottom: 14px; line-height: 1.55; }
  .retry-btn { padding: 8px 24px; border-radius: 10px; background: var(--grad-peri); border: none; color: #fff; font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .retry-btn:hover { opacity: 0.85; }
  .footer { text-align: center; margin-top: 24px; font-size: 11px; color: var(--text-meta); letter-spacing: 0.04em; line-height: 1.6; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card-body { animation: cardIn 0.25s ease-out both; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 760px) {
    .main-layout { flex-direction: column; }
    .sidebar { flex-direction: row; flex-wrap: wrap; width: 100%; position: static; gap: 6px; justify-content: center; }
    .sidebar-label { width: 100%; text-align: center; padding-bottom: 4px; }
    .ch-btn { padding: 7px 12px; font-size: 11.5px; border-radius: 20px; }
    .ch-btn .btn-icon { display: none; }
    .hero-articles { grid-template-columns: 1fr; }
    .app { padding: 20px 14px 36px; }
    .hero-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
    .hero-title { font-size: 17px; }
    .content-card { padding: 18px 16px; }
    .card-ch-name { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="blob-teal"></div>
<div class="app" id="app">
  <div class="loading-container"><div class="loading-spinner"></div><div class="loading-text">Loading intelligence briefing…</div></div>
</div>
<script>
(function() {
  var ICONS = {
    'AI Tools & Platforms': '<svg viewBox="0 0 24 24"><path d="M21 10.12h-6.78l2.74-2.82c-2.73-2.7-7.15-2.8-9.88-.1-2.73 2.71-2.73 7.08 0 9.79s7.15 2.71 9.88 0C18.32 15.65 19 14.08 19 12.1h2c0 1.98-.88 4.55-2.64 6.29-3.51 3.48-9.21 3.48-12.72 0-3.5-3.47-3.53-9.11-.02-12.58s9.14-3.49 12.65 0L21 3v7.12zM12.5 8v4.25l3.5 2.08-.72 1.21L11 13V8h1.5z"/></svg>',
    'SEO & GEO': '<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>',
    'Paid Search': '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95.49-7.4-2.43-7.93-6.37C4.53 9.61 7.96 6.12 12 6.07V2l5 5-5 5V8.07c-2.76.44-4.77 2.99-4.33 5.75.37 2.27 2.06 3.96 4.33 4.33v1.78zm6.07-4.56c-.18.67-.46 1.31-.84 1.88l-1.46-1.46c.22-.36.39-.75.51-1.17l1.79.75z"/></svg>',
    'Paid Social': '<svg viewBox="0 0 24 24"><path d="M18 11v2h4v-2h-4zm-2 6.61c.96.71 2.21 1.65 3.2 2.39.4-.53.8-1.07 1.2-1.6-.99-.74-2.24-1.68-3.2-2.4-.4.54-.8 1.08-1.2 1.61zM20.4 5.6c-.4-.53-.8-1.07-1.2-1.6-.99.74-2.24 1.68-3.2 2.4.4.53.8 1.07 1.2 1.6.96-.72 2.21-1.65 3.2-2.4zM4 9c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h1l5 3V6L5 9H4zm11.5 3c0-1.33-.58-2.53-1.5-3.35v6.69c.92-.81 1.5-2.01 1.5-3.34z"/></svg>',
    'Content & PR': '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
    'Design & Creative': '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
    'Email, CRM & SMS': '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>',
    'Analytics & Data': '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>',
    'Regulatory & Compliance': '<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>',
    'Fertility Sector': '<svg viewBox="0 0 24 24"><path d="M17.56 14.24c.28-.69.44-1.45.44-2.24 0-3.31-2.69-6-6-6s-6 2.69-6 6c0 .79.16 1.55.44 2.24C4.39 15.61 3 17.74 3 20v2h18v-2c0-2.26-1.39-4.39-3.44-5.76zM12 8c2.21 0 4 1.79 4 4s-1.79 4-4 4-4-1.79-4-4 1.79-4 4-4zm0 10c-3.37 0-7 1.56-7 3v1h14v-1c0-1.44-3.63-3-7-3z"/></svg>',
    'article': '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>'
  };
  var CHANNELS = [
    { key: 'AI Tools & Platforms', grad: 'var(--grad-sweep)', dot: '#FFBB06' },
    { key: 'SEO & GEO', grad: 'var(--grad-teal)', dot: '#1a9e96' },
    { key: 'Paid Search', grad: 'var(--grad-gold)', dot: '#FFBB06' },
    { key: 'Paid Social', grad: 'var(--grad-peri)', dot: '#8598E3' },
    { key: 'Content & PR', grad: 'var(--grad-navy)', dot: '#3d2580' },
    { key: 'Design & Creative', grad: 'var(--grad-cran)', dot: '#c04ac8' },
    { key: 'Email, CRM & SMS', grad: 'linear-gradient(135deg, #261759 0%, #5566cc 100%)', dot: '#5566cc' },
    { key: 'Analytics & Data', grad: 'var(--grad-mint)', dot: '#8DCA8B' },
    { key: 'Regulatory & Compliance', grad: 'linear-gradient(135deg, #571759 0%, #85298C 100%)', dot: '#85298C' },
    { key: 'Fertility Sector', grad: 'linear-gradient(135deg, #0E635D 0%, #8DCA8B 100%)', dot: '#0E635D' }
  ];
  var dataByChannel = {};
  var activeChannel = null;
  var briefingDate = null;

  function norm(r) { return (r && r.fields && typeof r.fields === 'object') ? r.fields : r; }

  function fmtDate(d) {
    var dt = d ? new Date(d + 'T12:00:00') : new Date();
    return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }
  function fmtDateShort(d) {
    var dt = d ? new Date(d + 'T12:00:00') : new Date();
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function extractSource(url) {
    if (!url) return '';
    try {
      var h = new URL(url).hostname.replace(/^www\./, '');
      var m = {
        'searchengineland.com':'Search Engine Land','searchenginejournal.com':'Search Engine Journal',
        'martech.org':'Martech','marketingprofs.com':'MarketingProfs',
        'socialmediatoday.com':'Social Media Today','socialmediaexaminer.com':'Social Media Examiner',
        'adage.com':'Ad Age','moz.com':'Moz','hubspot.com':'HubSpot','blog.hubspot.com':'HubSpot Blog',
        'salesforce.com':'Salesforce','contentmarketinginstitute.com':'Content Marketing Institute',
        'healthcareitnews.com':'Healthcare IT News','modernhealthcare.com':'Modern Healthcare',
        'fiercehealthcare.com':'Fierce Healthcare','nytimes.com':'NYT','theverge.com':'The Verge',
        'wired.com':'Wired','arstechnica.com':'Ars Technica','techcrunch.com':'TechCrunch',
        'reuters.com':'Reuters','openai.com':'OpenAI','blog.google':'Google Blog',
        'siliconangle.com':'SiliconANGLE','emarketer.com':'EMARKETER','digitalapplied.com':'Digital Applied',
        'gezar.dk':'Gezar','business.google.com':'Google Business','theaimarketers.ai':'The AI Marketers',
        'contentmarketing.ai':'Content Marketing AI','techbuzz.ai':'TechBuzz',
        'accelerateddigitalmedia.com':'Accelerated Digital Media',
        'fertilitynewstoday.com':'Fertility News Today','fertilityandsterility.org':'Fertility & Sterility',
        'apnews.com':'AP News','statnews.com':'STAT News','cnbc.com':'CNBC','cnn.com':'CNN','bbc.com':'BBC'
      };
      return m[h] || h.split('.')[0].charAt(0).toUpperCase() + h.split('.')[0].slice(1);
    } catch(e) { return ''; }
  }

  function getArticleMeta(data, which, fallbackDate) {
    var src = '', dt = '';
    if (which === 1) {
      src = data['Article Source'] || extractSource(data['Article URL']);
      dt = data['Article Date'] || (fallbackDate ? fmtDateShort(fallbackDate) : '');
    } else {
      src = data['Article Source 2'] || extractSource(data['Article URL 2']);
      dt = data['Article Date 2'] || (fallbackDate ? fmtDateShort(fallbackDate) : '');
    }
    var parts = [];
    if (src) parts.push(src);
    if (dt) parts.push(dt);
    return parts.join(' · ');
  }

  /* Filter to only the most recent date's records */
  function filterLatest(records) {
    var all = records.map(norm);
    if (all.length === 0) return [];
    var dates = [];
    for (var i = 0; i < all.length; i++) {
      if (all[i].Date && dates.indexOf(all[i].Date) === -1) {
        dates.push(all[i].Date);
      }
    }
    dates.sort().reverse();
    var latestDate = dates[0];
    var filtered = [];
    for (var j = 0; j < records.length; j++) {
      var f = norm(records[j]);
      if (f.Date === latestDate) filtered.push(records[j]);
    }
    return filtered;
  }

  function fetchData() {
    return fetch('/api/get-intelligence').then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function(j) {
      var raw = Array.isArray(j) ? j : (j.records || j.data || []);
      return filterLatest(raw);
    });
  }

  function renderApp(records) {
    var app = document.getElementById('app');
    var all = records.map(norm);
    briefingDate = all.length > 0 ? all[0].Date : null;

    dataByChannel = {};
    CHANNELS.forEach(function(c) { dataByChannel[c.key] = null; });
    all.forEach(function(f) {
      if (f.Channel && f.Channel in dataByChannel && dataByChannel[f.Channel] === null) dataByChannel[f.Channel] = f;
    });
    activeChannel = CHANNELS[0].key;

    var hero = null;
    for (var i = 0; i < all.length; i++) { if (all[i].Channel === 'Hero') { hero = all[i]; break; } }

    var heroHL = (hero && hero.ToDo1) ? hero.ToDo1 : "Latest updates across your marketing channels.";
    var heroBody = (hero && hero.Insight) ? hero.Insight : '';
    var heroA1 = hero ? (hero['Article Title'] || '') : '';
    var heroU1 = hero ? (hero['Article URL'] || '') : '';
    var heroA2 = hero ? (hero['Article Title 2'] || '') : '';
    var heroU2 = hero ? (hero['Article URL 2'] || '') : '';
    var artIcon = ICONS['article'];

    var h = '';

    /* Hero bar */
    h += '<div class="hero-bar"><div class="hero-left">';
    h += '<div class="hero-title"><span class="gradient-text">Recent News</span> for the USF Marketing Team</div>';
    h += '</div><div class="hero-date-area">';
    h += '<div class="hero-date">' + fmtDate(briefingDate) + '</div>';
    h += '<div class="hero-refresh">Refreshed daily at 6:00 AM ET</div>';
    h += '</div></div>';

    /* Hero news */
    h += '<div class="hero-news"><div class="hero-news-label">Biggest News</div>';
    h += '<div class="hero-headline">' + heroHL + '</div>';
    if (heroBody) h += '<div class="hero-overview">' + heroBody + '</div>';
    if ((heroA1 && heroU1) || (heroA2 && heroU2)) {
      h += '<div class="hero-articles">';
      if (heroA1 && heroU1) {
        var hm1 = hero ? getArticleMeta(hero, 1, briefingDate) : '';
        h += '<a class="hero-article" href="' + heroU1 + '" target="_blank" rel="noopener"><span class="ha-title"><span class="ha-icon">' + artIcon + '</span><span>' + heroA1 + '</span><span class="arrow">↗</span></span>' + (hm1 ? '<span class="ha-meta">' + hm1 + '</span>' : '') + '</a>';
      }
      if (heroA2 && heroU2) {
        var hm2 = hero ? getArticleMeta(hero, 2, briefingDate) : '';
        h += '<a class="hero-article" href="' + heroU2 + '" target="_blank" rel="noopener"><span class="ha-title"><span class="ha-icon">' + artIcon + '</span><span>' + heroA2 + '</span><span class="arrow">↗</span></span>' + (hm2 ? '<span class="ha-meta">' + hm2 + '</span>' : '') + '</a>';
      }
      h += '</div>';
    }
    h += '</div>';

    /* Main layout */
    h += '<div class="main-layout"><div class="sidebar" id="sidebarNav"><div class="sidebar-label">News by Channel / Topic</div>';
    CHANNELS.forEach(function(c) {
      var act = c.key === activeChannel;
      h += '<button class="ch-btn' + (act ? ' active' : '') + '" data-key="' + c.key + '"><span class="btn-dot" style="background:' + c.dot + '"></span><span class="btn-icon">' + ICONS[c.key] + '</span><span>' + c.key + '</span></button>';
    });
    h += '</div><div class="content-area" id="contentCard"></div></div>';
    h += '<div class="footer">AI-generated. Treat all claims as unverified until confirmed by a human source.<br>Refreshed daily at 6:00 AM ET · USF AI Marketing Hub</div>';

    app.innerHTML = h;
    document.querySelectorAll('.ch-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var k = this.dataset.key;
        if (k === activeChannel) return;
        activeChannel = k;
        document.querySelectorAll('.ch-btn').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        renderCard();
      });
    });
    renderCard();
    notifyHeight();
  }

  function renderCard() {
    var container = document.getElementById('contentCard');
    var ch = null;
    for (var i = 0; i < CHANNELS.length; i++) { if (CHANNELS[i].key === activeChannel) { ch = CHANNELS[i]; break; } }
    if (!ch) return;
    var data = dataByChannel[ch.key];
    var icon = ICONS[ch.key];
    var artIcon = ICONS['article'];

    if (!data) {
      container.innerHTML = '<div class="content-card"><div class="card-body"><div class="card-ch-header"><div class="card-ch-icon" style="background:' + ch.grad + '">' + icon + '</div><div class="card-ch-name">' + ch.key + '</div></div><div class="empty-state">No update for this channel today.</div></div></div>';
      notifyHeight();
      return;
    }

    var insight = data.Insight || '';
    var todo1 = data.ToDo1 || '';
    var todo2 = data.ToDo2 || '';
    var art1 = data['Article Title'] || '';
    var url1 = data['Article URL'] || '';
    var art2 = data['Article Title 2'] || '';
    var url2 = data['Article URL 2'] || '';
    var stack = data.Stack || '';
    var rDate = data.Date || briefingDate || '';

    var inner = '<div class="card-ch-header"><div class="card-ch-icon" style="background:' + ch.grad + '">' + icon + '</div><div class="card-ch-name">' + ch.key + '</div></div>';
    if (insight) inner += '<div class="sect-label">Insight</div><div class="insight-text">' + insight + '</div>';
    if (todo1 || todo2) {
      inner += '<div class="sect-label">Recommendations</div><div class="rec-list">';
      if (todo1) inner += '<div class="rec-item"><span class="rec-dot" style="background:' + ch.dot + '"></span><span>' + todo1 + '</span></div>';
      if (todo2) inner += '<div class="rec-item"><span class="rec-dot" style="background:' + ch.dot + '"></span><span>' + todo2 + '</span></div>';
      inner += '</div>';
    }
    if ((art1 && url1) || (art2 && url2)) {
      inner += '<div class="sect-label">Reading</div><div class="article-list">';
      if (art1 && url1) {
        var m1 = getArticleMeta(data, 1, rDate);
        inner += '<a class="article-link" href="' + url1 + '" target="_blank" rel="noopener"><div class="article-title-row"><span class="link-icon">' + artIcon + '</span><span>' + art1 + '</span><span class="arrow">↗</span></div>' + (m1 ? '<div class="article-meta">' + m1 + '</div>' : '') + '</a>';
      }
      if (art2 && url2) {
        var m2 = getArticleMeta(data, 2, rDate);
        inner += '<a class="article-link" href="' + url2 + '" target="_blank" rel="noopener"><div class="article-title-row"><span class="link-icon">' + artIcon + '</span><span>' + art2 + '</span><span class="arrow">↗</span></div>' + (m2 ? '<div class="article-meta">' + m2 + '</div>' : '') + '</a>';
      }
      inner += '</div>';
    }
    if (stack) {
      inner += '<div class="sect-label">Current Stack</div><div class="stack-pills">';
      stack.split(',').forEach(function(s) { var t = s.trim(); if (t) inner += '<span class="stack-pill">' + t + '</span>'; });
      inner += '</div>';
    }
    container.innerHTML = '<div class="content-card"><div class="card-body">' + inner + '</div></div>';
    notifyHeight();
  }

  /* Tell parent iframe to resize to full content height */
  function notifyHeight() {
    try {
      var h = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: 'resize-iframe', height: h }, '*');
    } catch(e) {}
  }

  function renderError(msg) {
    document.getElementById('app').innerHTML = '<div class="hero-bar"><div class="hero-left"><div class="hero-title"><span class="gradient-text">Recent News</span> for the USF Marketing Team</div></div></div><div class="error-container"><div class="error-icon">⚠</div><div class="error-msg">' + msg + '</div><button class="retry-btn" onclick="location.reload()">Retry</button></div>';
  }

  fetchData().then(function(r) { renderApp(r); }).catch(function(e) {
    console.error('Fetch failed:', e);
    renderError('Could not load the briefing. Confirm the n8n automation has run and the API endpoint is reachable.');
  });
})();
</script>
</body>
</html>
