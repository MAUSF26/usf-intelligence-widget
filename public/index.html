<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USF Daily AI News Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#261759;
  --emerald:#0E635D;
  --cranberry:#571759;
  --bright-cran:#85298C;
  --peri:#8598E3;
  --gold:#FFBB06;
  --mint:#8DCA8B;
  --slate:#AEC6D1;
  --gray:#E4E9EB;
  --grad-sweep:linear-gradient(135deg,#8598E3,#85298C);
  --grad-teal:linear-gradient(135deg,#0E635D,#0a4a45);
  --grad-peri:linear-gradient(135deg,#8598E3,#5060a0);
  --grad-navy:linear-gradient(135deg,#261759,#1a0f3d);
  --grad-cran:linear-gradient(135deg,#571759,#3d1040);
  --grad-gold:linear-gradient(135deg,#FFBB06,#cc9200);
  --grad-mint:linear-gradient(135deg,#0E635D,#8DCA8B);
  --t1:#ffffff;
  --t2:rgba(255,255,255,0.85);
  --t3:rgba(255,255,255,0.65);
  --t4:rgba(255,255,255,0.45);
}
html,body{
  font-family:'Roboto',sans-serif;
  background:var(--navy);
  color:var(--t1);
  min-height:100vh;
  overflow-x:hidden;
}
body{
  background:
    radial-gradient(ellipse 90% 60% at -5% 5%,rgba(14,99,93,0.22) 0%,transparent 55%),
    radial-gradient(ellipse 70% 55% at 105% 95%,rgba(133,41,140,0.18) 0%,transparent 55%),
    #261759;
  background-attachment:fixed;
  padding:24px 20px 60px;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
  position:relative;z-index:10;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--grad-sweep);
  box-shadow:0 0 14px rgba(133,152,227,0.6);
  flex-shrink:0;
}
.brand-name{
  font-size:15px;font-weight:700;letter-spacing:.03em;color:var(--t1);
}
.brand-name span{
  background:var(--grad-sweep);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.date-pill{
  font-size:11px;font-weight:600;color:var(--t3);
  letter-spacing:.08em;text-transform:uppercase;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:4px 12px;
}
.refresh-note{
  font-size:10px;color:var(--t4);
  letter-spacing:.04em;
}

/* ── HERO PANEL ── */
.hero{
  position:relative;overflow:hidden;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:16px;
  padding:22px 24px 18px;
  margin-bottom:10px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  z-index:10;
}
.hero::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28),transparent);
}
.hero::after{
  content:'';position:absolute;
  top:-40px;right:-40px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(133,152,227,0.08),transparent 70%);
  pointer-events:none;
}
.hero-eye{
  font-size:10px;font-weight:700;color:var(--t4);
  letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:10px;
}
.hero-title{
  font-size:24px;font-weight:700;color:var(--t1);
  line-height:1.15;margin-bottom:4px;
}
.hero-title span{
  background:var(--grad-sweep);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-tagline{
  font-size:12px;color:var(--t3);margin-bottom:14px;font-weight:300;
}
.hero-body{
  font-size:13px;color:var(--t2);line-height:1.72;
  font-weight:300;
}

/* ── NEW DROPS ── */
.drops{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:14px;padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.08);
  align-items:center;
}
.drops-lbl{
  font-size:10px;font-weight:700;color:var(--t4);
  letter-spacing:.15em;text-transform:uppercase;
  width:100%;margin-bottom:2px;
}
.drop-pill{
  font-size:11px;font-weight:500;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.88);
  border-radius:20px;padding:3px 11px;
}
.drop-pill.hot{
  background:rgba(133,152,227,0.15);
  border-color:rgba(133,152,227,0.35);
  color:#c4d0f5;
}

/* ── CHANNELS ACCORDION ── */
.channels-acc{
  position:relative;z-index:10;
  margin-top:10px;
}
.channels-header{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  padding:13px 18px;
  cursor:pointer;
  user-select:none;
  transition:background .2s;
}
.channels-header:hover{background:rgba(255,255,255,0.08)}
.channels-header.open{
  border-radius:12px 12px 0 0;
  border-bottom-color:transparent;
  background:rgba(255,255,255,0.07);
}
.channels-header-left{display:flex;align-items:center;gap:10px}
.channels-icon{
  font-size:14px;
}
.channels-label{font-size:13px;font-weight:700;color:var(--t1)}
.channels-sub{font-size:11px;color:var(--t4);margin-left:4px}
.channels-chevron{
  font-size:10px;color:var(--t4);
  width:20px;height:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .25s;flex-shrink:0;
}
.channels-body{
  max-height:0;overflow:hidden;
  transition:max-height .5s cubic-bezier(.4,0,.2,1);
  border:1px solid rgba(255,255,255,0.12);
  border-top:none;
  border-radius:0 0 12px 12px;
}
.channels-body.open{max-height:9000px}
.channels-inner{padding:12px}

/* ── CHANNEL GRID ── */
.ch-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

/* ── CHANNEL CARD ── */
.ch-card{
  position:relative;overflow:hidden;
  border-radius:14px;
  cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease;
}
.ch-card:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 36px rgba(0,0,0,0.35);
}
.ch-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.32),transparent);
  z-index:2;
}

/* Card gradient themes */
.ch-card.theme-teal{background:linear-gradient(145deg,rgba(14,99,93,0.55),rgba(14,99,93,0.25));border:1px solid rgba(14,99,93,0.55)}
.ch-card.theme-peri{background:linear-gradient(145deg,rgba(133,152,227,0.45),rgba(133,152,227,0.18));border:1px solid rgba(133,152,227,0.5)}
.ch-card.theme-navy{background:linear-gradient(145deg,rgba(38,23,89,0.8),rgba(38,23,89,0.5));border:1px solid rgba(133,152,227,0.3)}
.ch-card.theme-cran{background:linear-gradient(145deg,rgba(133,41,140,0.5),rgba(133,41,140,0.22));border:1px solid rgba(133,41,140,0.5)}
.ch-card.theme-gold{background:linear-gradient(145deg,rgba(255,187,6,0.35),rgba(255,187,6,0.12));border:1px solid rgba(255,187,6,0.4)}
.ch-card.theme-mint{background:linear-gradient(145deg,rgba(14,99,93,0.4),rgba(141,202,139,0.2));border:1px solid rgba(141,202,139,0.4)}
.ch-card.theme-sweep{background:linear-gradient(145deg,rgba(133,152,227,0.45),rgba(133,41,140,0.35));border:1px solid rgba(133,152,227,0.45)}

.ch-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 14px 11px;
}
.ch-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
}
.ch-text{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:700;color:var(--t1);line-height:1.2}
.ch-tog{
  width:20px;height:20px;border-radius:5px;flex-shrink:0;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.14);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--t4);
  transition:transform .22s,background .2s;
}
.ch-card.open .ch-tog{
  transform:rotate(180deg);
  background:rgba(255,255,255,0.14);
}
.ch-divider{height:1px;background:rgba(255,255,255,0.10);margin:0 14px}
.ch-body{max-height:0;overflow:hidden;transition:max-height .42s cubic-bezier(.4,0,.2,1)}
.ch-card.open .ch-body{max-height:1200px}
.ch-inner{padding:12px 14px 16px}

/* ── CARD SECTIONS ── */
.sec-lbl{
  font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);
  letter-spacing:.16em;text-transform:uppercase;
  margin-bottom:6px;
}
.insight-txt{
  font-size:12px;color:var(--t2);line-height:1.68;
  margin-bottom:12px;font-weight:300;
}

/* Recommendations */
.rec-stack{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.rec-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 10px;border-radius:8px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.10);
  font-size:12px;color:rgba(255,255,255,0.92);
  line-height:1.5;
}
.rec-dot{
  width:6px;height:6px;border-radius:50%;
  flex-shrink:0;margin-top:4px;
  background:rgba(255,255,255,0.5);
}

/* Articles */
.art-stack{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.art-item{
  display:block;
  padding:7px 10px;border-radius:8px;
  background:rgba(174,198,209,0.08);
  border:1px solid rgba(174,198,209,0.18);
  text-decoration:none;
  transition:background .2s;
}
.art-item:hover{background:rgba(174,198,209,0.15)}
.art-title{
  font-size:11px;font-weight:600;color:var(--slate);
  display:block;margin-bottom:2px;line-height:1.4;
}
.art-pub{font-size:10px;color:var(--t4)}

/* Stack pills */
.stack-pills{display:flex;flex-wrap:wrap;gap:5px}
.stack-pill{
  font-size:11px;font-weight:500;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.88);
  border-radius:20px;padding:3px 10px;
}

/* ── LOADING / ERROR ── */
.state-msg{
  text-align:center;padding:50px 20px;
  font-size:13px;color:var(--t4);
  position:relative;z-index:10;
}
.spinner{
  width:26px;height:26px;
  border:2px solid rgba(255,255,255,0.10);
  border-top-color:var(--peri);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE ── */
@media(max-width:800px){
  .ch-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:540px){
  body{padding:16px 12px 40px}
  .ch-grid{grid-template-columns:1fr}
  .ch-card.open{grid-column:1/-1}
  .hero-title{font-size:20px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name"><span>Daily AI</span> News Feed</div>
  </div>
  <div class="header-right">
    <div class="date-pill" id="datePill">Loading...</div>
    <div class="refresh-note">↻ Pulled daily at 6am</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="state-msg">
    <div class="spinner"></div>
    Loading today's intelligence...
  </div>
</div>

<script>
const CHANNELS = [
  { name:'SEO & GEO',             icon:'🔍', theme:'theme-teal',  recDot:'#8DCA8B' },
  { name:'Paid Social',           icon:'📱', theme:'theme-peri',  recDot:'#8598E3' },
  { name:'Content & Creative',    icon:'✏️', theme:'theme-navy',  recDot:'#C4B5E8' },
  { name:'Email & CRM',           icon:'📧', theme:'theme-teal',  recDot:'#8DCA8B' },
  { name:'Regulatory & Compliance',icon:'🛡️',theme:'theme-cran',  recDot:'#e4b0e8' },
  { name:'Fertility Sector',      icon:'🌸', theme:'theme-gold',  recDot:'#FFBB06' },
  { name:'AI Tools & Platforms',  icon:'🤖', theme:'theme-sweep', recDot:'#8598E3' },
];

const ORDER = CHANNELS.map(c => c.name);

function getChannelMeta(name) {
  return CHANNELS.find(c => c.name === name) || { icon:'📊', theme:'theme-navy', recDot:'rgba(255,255,255,0.5)' };
}

let openCard = null;

function toggleCard(el) {
  if (openCard && openCard !== el) openCard.classList.remove('open');
  el.classList.toggle('open');
  openCard = el.classList.contains('open') ? el : null;
}

function buildHero(records) {
  const first = records[0]?.fields;
  if (!first) return '';
  const d = new Date((first.Date || '') + 'T12:00:00');
  const dateStr = isNaN(d) ? 'Today' : d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('datePill').textContent = dateStr;

  const overview = first.Summary || first.Insight || '';

  return `
    <div class="hero">
      <div class="hero-eye">📡 Daily Brief · ${dateStr}</div>
      <div class="hero-title"><span>Daily AI</span> News Feed</div>
      <div class="hero-tagline">Marketing intelligence for the USF team · Pulled every morning at 6am</div>
      <div class="hero-body">${overview}</div>
    </div>
  `;
}

function buildCard(record) {
  const f = record.fields;
  const name = f.Channel || 'Unknown';
  const meta = getChannelMeta(name);

  const recs = [f.ToDo1, f.ToDo2].filter(Boolean).map(t => `
    <div class="rec-item">
      <div class="rec-dot" style="background:${meta.recDot}"></div>
      <span>${t}</span>
    </div>
  `).join('');

  const arts = [
    f['Article Title'] && f['Article URL'] ? { title: f['Article Title'], url: f['Article URL'], pub: f['Article Pub'] || '' } : null,
    f['Article Title 2'] && f['Article URL 2'] ? { title: f['Article Title 2'], url: f['Article URL 2'], pub: f['Article Pub 2'] || '' } : null,
  ].filter(Boolean).map(a => `
    <a class="art-item" href="${a.url}" target="_blank" rel="noopener">
      <span class="art-title">↗ ${a.title}</span>
      ${a.pub ? `<span class="art-pub">${a.pub}</span>` : ''}
    </a>
  `).join('');

  const stackPills = f.Stack ? f.Stack.split('·').map(s => `<span class="stack-pill">${s.trim()}</span>`).join('') : '';

  return `
    <div class="ch-card ${meta.theme}" onclick="toggleCard(this)">
      <div class="ch-header">
        <div class="ch-icon">${meta.icon}</div>
        <div class="ch-text">
          <div class="ch-name">${name}</div>
        </div>
        <div class="ch-tog">▼</div>
      </div>
      <div class="ch-divider"></div>
      <div class="ch-body">
        <div class="ch-inner">
          <div class="sec-lbl">Today's Signal</div>
          <div class="insight-txt">${f.Insight || ''}</div>
          ${recs ? `<div class="sec-lbl">Recommendations</div><div class="rec-stack">${recs}</div>` : ''}
          ${arts ? `<div class="sec-lbl">Reading</div><div class="art-stack">${arts}</div>` : ''}
          ${stackPills ? `<div class="sec-lbl">Current Stack</div><div class="stack-pills">${stackPills}</div>` : ''}
        </div>
      </div>
    </div>
  `;
}

async function load() {
  try {
    const res = await fetch('/api/get-intelligence');
    const data = await res.json();
    const records = data.records || [];

    if (!records.length) {
      document.getElementById('app').innerHTML = `
        <div class="state-msg">No intelligence loaded yet today.<br>Check back after 6am EST.</div>
      `;
      return;
    }

    records.sort((a,b) => {
      const ai = ORDER.indexOf(a.fields.Channel);
      const bi = ORDER.indexOf(b.fields.Channel);
      return (ai===-1?99:ai)-(bi===-1?99:bi);
    });

    const heroHTML = buildHero(records);
    const cardsHTML = records.map(buildCard).join('');
    const count = records.length;

    document.getElementById('app').innerHTML = `
      ${heroHTML}
      <div class="channels-acc">
        <div class="channels-header" onclick="toggleChannels(this)">
          <div class="channels-header-left">
            <span class="channels-icon">📊</span>
            <span class="channels-label">Channel Intelligence</span>
            <span class="channels-sub">${count} channels</span>
          </div>
          <div class="channels-chevron">▼</div>
        </div>
        <div class="channels-body" id="channelsBody">
          <div class="channels-inner">
            <div class="ch-grid">${cardsHTML}</div>
          </div>
        </div>
      </div>
    `;

  } catch(err) {
    document.getElementById('app').innerHTML = `
      <div class="state-msg">Unable to load data.<br><small style="opacity:.5">${err.message}</small></div>
    `;
  }
}

function toggleChannels(header) {
  const body = document.getElementById('channelsBody');
  const chevron = header.querySelector('.channels-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  header.classList.toggle('open');
  chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}

load();
</script>
</body>
</html>
