<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USF AI Intelligence Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#261759;
  --emerald:#0E635D;
  --cranberry:#571759;
  --slate:#AEC6D1;
  --gold:#FFBB06;
  --peri:#8598E3;
  --mint:#8DCA8B;
  --bright-cran:#85298C;
  --gray:#E4E9EB;
  --grad-navy:linear-gradient(135deg,#261759,#1a0f3d);
  --grad-teal:linear-gradient(135deg,#0E635D,#0a4a45);
  --grad-peri:linear-gradient(135deg,#8598E3,#6070c0);
  --grad-cran:linear-gradient(135deg,#571759,#3d1040);
  --grad-sweep:linear-gradient(135deg,#8598E3,#85298C);
  --t1:rgba(255,255,255,0.97);
  --t2:rgba(255,255,255,0.82);
  --t3:rgba(255,255,255,0.65);
  --t4:rgba(255,255,255,0.55);
}
html,body{
  font-family:'Roboto',sans-serif;
  background:#261759;
  color:var(--t1);
  min-height:100vh;
  overflow-x:hidden;
}
body{
  background:
    radial-gradient(ellipse 80% 60% at -10% 10%,rgba(14,99,93,0.18) 0%,transparent 55%),
    radial-gradient(ellipse 70% 50% at 110% 90%,rgba(133,41,140,0.15) 0%,transparent 55%),
    #261759;
  background-attachment:fixed;
  padding:28px 24px 60px;
}
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--grad-sweep);
  box-shadow:0 0 12px rgba(133,152,227,0.5);
}
.brand-name{font-size:1.1em;font-weight:700;letter-spacing:.04em}
.brand-name span{
  background:var(--grad-sweep);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.date-pill{
  font-size:11px;font-weight:700;color:var(--t4);
  letter-spacing:.12em;text-transform:uppercase;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:5px 14px;
}
.hero{
  position:relative;overflow:hidden;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:16px;
  padding:24px 28px 20px;
  margin-bottom:12px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.hero::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.30),transparent);
}
.hero-eye{
  font-size:11px;font-weight:700;color:var(--t4);
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:10px;
}
.hero-title{
  font-size:22px;font-weight:700;color:var(--t1);
  margin-bottom:10px;line-height:1.2;
}
.hero-body{
  font-size:13px;color:var(--t2);line-height:1.7;
  max-width:720px;
}
.drops{
  display:flex;flex-wrap:wrap;gap:7px;
  margin:14px 0 0;padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.08);
}
.drops-label{
  font-size:11px;font-weight:700;color:var(--t4);
  letter-spacing:.12em;text-transform:uppercase;
  width:100%;margin-bottom:4px;
}
.drop-pill{
  font-size:11px;font-weight:600;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.90);
  border-radius:20px;padding:4px 13px;
}
.section-header{
  display:flex;align-items:center;gap:12px;
  margin:28px 0 14px;
}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.12),transparent)}
.section-label{
  font-size:11px;font-weight:700;color:var(--t4);
  letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.card{
  position:relative;overflow:hidden;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.28);
}
.card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28),transparent);
}
.card-top{
  display:flex;align-items:center;gap:10px;
  padding:14px 14px 12px;
}
.card-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.card-name{font-size:13px;font-weight:700;color:var(--t1)}
.card-toggle{
  margin-left:auto;
  font-size:10px;color:var(--t4);
  width:18px;height:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s;
  flex-shrink:0;
}
.card.open .card-toggle{transform:rotate(180deg)}
.card-divider{height:1px;background:rgba(255,255,255,0.08);margin:0 14px}
.card-body{
  max-height:0;overflow:hidden;
  transition:max-height .4s cubic-bezier(.4,0,.2,1);
}
.card.open .card-body{max-height:800px}
.card-inner{padding:12px 14px 16px}
.section-lbl{
  font-size:11px;font-weight:700;color:var(--t4);
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:6px;
}
.insight-text{
  font-size:12px;color:var(--t2);line-height:1.65;
  margin-bottom:12px;
}
.nstack{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.nitem{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 10px;border-radius:8px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.09);
  font-size:12px;color:rgba(255,255,255,0.90);
  line-height:1.5;
}
.ndot{
  width:6px;height:6px;border-radius:50%;
  flex-shrink:0;margin-top:4px;
}
.article-link{
  display:block;
  font-size:11px;color:var(--slate);
  text-decoration:none;
  padding:6px 10px;
  background:rgba(174,198,209,0.08);
  border:1px solid rgba(174,198,209,0.18);
  border-radius:8px;
  transition:background .2s;
}
.article-link:hover{
  background:rgba(174,198,209,0.14);
  color:#c8dde6;
}
.state-msg{
  text-align:center;padding:60px 20px;
  font-size:13px;color:var(--t4);
}
.spinner{
  width:28px;height:28px;
  border:2px solid rgba(255,255,255,0.12);
  border-top-color:var(--peri);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}body{padding:18px 14px 40px}}
</style>
</head>
<body>
<div class="header">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name"><span>AI</span> Intelligence Hub</div>
  </div>
  <div class="date-pill" id="datePill">Loading...</div>
</div>
<div id="app">
  <div class="state-msg">
    <div class="spinner"></div>
    Loading today's intelligence...
  </div>
</div>
<script>
const CHANNEL_STYLES = {
  'SEO and GEO':          { dot:'#0E635D', border:'rgba(14,99,93,0.45)' },
  'Paid Social':          { dot:'#8598E3', border:'rgba(133,152,227,0.45)' },
  'Content Marketing':    { dot:'#261759', border:'rgba(133,152,227,0.35)' },
  'Email and CRM':        { dot:'#0E635D', border:'rgba(14,99,93,0.35)' },
  'Healthcare Marketing': { dot:'#85298C', border:'rgba(133,41,140,0.45)' },
  'Fertility Marketing':  { dot:'#FFBB06', border:'rgba(255,187,6,0.45)' },
  'Broader AI':           { dot:'rgba(255,255,255,0.4)', border:'rgba(255,255,255,0.15)' }
};
let openCard = null;
function toggleCard(el) {
  if (openCard && openCard !== el) openCard.classList.remove('open');
  el.classList.toggle('open');
  openCard = el.classList.contains('open') ? el : null;
}
function buildHero(records) {
  const first = records[0]?.fields;
  if (!first) return '';
  const d = new Date(first.Date + 'T12:00:00');
  const dateStr = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('datePill').textContent = dateStr;
  return `
    <div class="hero">
      <div class="hero-eye">📡 Daily Brief · ${dateStr}</div>
      <div class="hero-title">USF AI Intelligence Hub</div>
      <div class="hero-body" id="heroBody">Loading overview...</div>
    </div>
  `;
}
function buildCard(record) {
  const f = record.fields;
  const name = f.Channel || 'Unknown';
  const style = CHANNEL_STYLES[name] || { dot:'rgba(255,255,255,0.4)', border:'rgba(255,255,255,0.15)' };
  return `
    <div class="card" onclick="toggleCard(this)" style="border-top:2px solid ${style.border}">
      <div class="card-top">
        <div class="card-dot" style="background:${style.dot}"></div>
        <div>
          <div class="card-name">${name}</div>
        </div>
        <div class="card-toggle">▼</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body">
        <div class="card-inner">
          <div class="section-lbl">Today's Insight</div>
          <div class="insight-text">${f.Insight || ''}</div>
          <div class="section-lbl">Action Items</div>
          <div class="nstack">
            ${[f.ToDo1, f.ToDo2, f.ToDo3].filter(Boolean).map(t => `
              <div class="nitem">
                <div class="ndot" style="background:${style.dot}"></div>
                <span>${t}</span>
              </div>
            `).join('')}
          </div>
          ${f['Article Title'] && f['Article URL'] ? `
            <div class="section-lbl">Reading</div>
            <a class="article-link" href="${f['Article URL']}" target="_blank" rel="noopener">
              ↗ ${f['Article Title']}
            </a>
          ` : ''}
        </div>
      </div>
    </div>
  `;
}
async function loadIntelligence() {
  try {
    const res = await fetch('/api/get-intelligence');
    const data = await res.json();
    const records = data.records || [];
    if (!records.length) {
      document.getElementById('app').innerHTML = `
        <div class="state-msg">No intelligence data found for today.<br>Check back after 6am.</div>
      `;
      return;
    }
    const ORDER = ['SEO and GEO','Paid Social','Content Marketing','Email and CRM','Healthcare Marketing','Fertility Marketing','Broader AI'];
    records.sort((a,b) => {
      const ai = ORDER.indexOf(a.fields.Channel);
      const bi = ORDER.indexOf(b.fields.Channel);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    const heroHTML = buildHero(records);
    const cardsHTML = records.map(buildCard).join('');
    document.getElementById('app').innerHTML = `
      ${heroHTML}
      <div class="section-header">
        <span class="section-label">Channel Intelligence</span>
        <div class="section-line"></div>
      </div>
      <div class="grid">${cardsHTML}</div>
    `;
    const heroBody = document.getElementById('heroBody');
    if (heroBody) {
      const first = records[0]?.fields;
      heroBody.textContent = first?.Summary || first?.Insight || 'Intelligence loaded successfully.';
    }
  } catch(err) {
    document.getElementById('app').innerHTML = `
      <div class="state-msg">Unable to load intelligence data.<br><small>${err.message}</small></div>
    `;
  }
}
loadIntelligence();
</script>
</body>
</html>
